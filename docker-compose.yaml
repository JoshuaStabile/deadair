services:

  deadair:
    build: .
    image: deadair:latest
    container_name: deadair
    restart: unless-stopped
    depends_on:
      - ollama
      - icecast
    volumes:
      - /opt/deadair/:/app
      - /opt/jellyfin/config/data:/jellyfin:ro
      - /mnt/media/music:/media/music
    environment:
      - PYTHONPATH=/app/code
      - JELLYFIN_DB_PATH=/jellyfin/jellyfin.db
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=tinyllama
      - ICECAST_URL=icecast://source:${ICECAST_SOURCE_PASSWORD}@icecast:8000/radio
    networks:
      - radio-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - radio-net

  icecast:
    image: deepcomp/icecast2
    container_name: icecast
    restart: unless-stopped
    volumes: 
      - /opt/icecast/icecast.xml:/etc/icecast.xml
    ports:
      - "8000:8000"
    networks:
      - radio-net
    env_file:
      - /opt/icecast/.env

networks:
  radio-net:

volumes:
  ollama-data: