services:

  deadair:
    build: .
    image: deadair:latest
    container_name: deadair
    restart: unless-stopped
    depends_on:
      - ollama
      - icecast
    volumes:
      - /opt/deadair/:/app
      - /opt/jellyfin/config/data:/jellyfin:ro
      - /mnt/media/music:/media/music
    networks:
      - radio-net
    env_file: 
      - .env

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - radio-net

  icecast:
    image: deepcomp/icecast2
    container_name: icecast
    restart: unless-stopped
    volumes: 
      - /opt/icecast/icecast.xml:/etc/icecast.xml:ro
    ports:
      - "8000:8000"
    networks:
      - radio-net
    
networks:
  radio-net:

volumes:
  ollama-data: